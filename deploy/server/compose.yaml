name: petory

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: petory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: petory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petory -d petory"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://petory:${POSTGRES_PASSWORD}@postgres:5432/petory?schema=public
      PORT: 8787
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - uploads:/app/server/uploads
      - ./downloads:/app/server/public/downloads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 8

volumes:
  postgres_data:
  uploads:
