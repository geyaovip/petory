name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer (Universal)
        run: npm run build && npx electron-builder --mac --universal

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          if-no-files-found: error
          path: |
            release/*.dmg
            release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run pack:win

      - uses: actions/upload-artifact@v4
        with:
          name: win-dist
          if-no-files-found: error
          path: |
            release/*.exe
            release/latest.yml

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release directory
        shell: bash
        run: |
          mkdir -p release
          cp artifacts/mac-dist/* release/
          cp artifacts/win-dist/* release/
          ls -lah release

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync website release manifests
        env:
          PETORY_RELEASE_ASSET_BASE: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}
        run: |
          npm run release:prepare

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Petory ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.exe
            website/releases/latest.json
            website/releases/latest-mac.yml
            website/releases/latest.yml

      - name: Commit release feed updates
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/releases/
          if git diff --cached --quiet; then
            echo "No release feed changes to commit."
            exit 0
          fi
          git commit -m "chore: sync release feeds for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
